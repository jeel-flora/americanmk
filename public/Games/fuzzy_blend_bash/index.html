<body>
    <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
    <div id="splash">
        <!--<div class="progress-bar stripes">
    <span style="width: 0%"></span>-->
        <img src="splash.png">
        <div class="progress-bar">
            <div id="progress-fill" class="stripes">
                <img src="bar-loaded.png">
                <span style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"></span>
            </div>
        </div>

        <script>
            window["GD_OPTIONS"] = {
                "gameId": "c8fc4f932b434979b7d8d8d92535c1c7",
                "onEvent": function(event) {
                    switch (event.name) {
                        case "SDK_READY":
                            console.log("SDK is now ready");
                            break;
                        case "SDK_GAME_START":
                            if (gpSDK.gdGameStart) {
                                gpSDK.gdGameStart();
                            }
                            // advertisement done, resume game logic and unmute audio
                            break;
                        case "SDK_GAME_PAUSE":
                            // pause game logic / mute audio
                            if (gpSDK.gdGamePause) {
                                gpSDK.gdGamePause();
                            }
                            break;
                        case "SDK_GDPR_TRACKING":
                            // this event is triggered when your user doesn't want to be tracked
                            if (gpSDK.gdGdprTracking) {
                                gpSDK.gdGdprTracking();
                            }
                            break;
                        case "SDK_GDPR_TARGETING":
                            // this event is triggered when your user doesn't want personalised targeting of ads and such
                            if (gpSDK.gdGdprTargetting) {
                                gpSDK.gdGdprTargetting();
                            }
                            break;
                    }
                },
            };
        </script>
        <script src="./main.min.js"></script>
        <script src="gdsdk.js"></script>

        <script src="src/settings.js" charset="utf-8"></script>

        <script src="main.js" charset="utf-8"></script>

        <script type="text/javascript">
            (function() {
                // open web debugger console
                if (typeof VConsole !== 'undefined') {
                    window.vConsole = new VConsole();
                }

                var debug = window._CCSettings.debug;
                var splash = document.getElementById('splash');
                splash.style.display = 'block';

                function loadScript(moduleName, cb) {
                    function scriptLoaded() {
                        document.body.removeChild(domScript);
                        domScript.removeEventListener('load', scriptLoaded, false);
                        cb && cb();
                    };
                    var domScript = document.createElement('script');
                    domScript.async = true;
                    domScript.src = moduleName;
                    domScript.addEventListener('load', scriptLoaded, false);
                    document.body.appendChild(domScript);
                }

                loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.js', function() {
                    if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
                        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
                    } else {
                        window.boot();
                    }
                });
            })();
        </script>


    </div>
